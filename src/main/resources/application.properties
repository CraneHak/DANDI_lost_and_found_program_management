spring.application.name=capstonedesign
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/dandidb?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=dandi
spring.datasource.password=dandi1234

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# AWS S3
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
cloud.aws.region=ap-northeast-2
cloud.aws.s3.bucket=${S3_BUCKET_NAME}

# 파일 업로드 최대 크기
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
