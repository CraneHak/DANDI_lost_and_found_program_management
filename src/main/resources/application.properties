spring.application.name=capstonedesign
server.port=8080

# CORS (comma-separated). .env 예: CORS_ALLOWED_ORIGINS=http://localhost:3000,http://172.31.112.5:3000
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8085}

# MySQL (AWS RDS)
spring.datasource.url=jdbc:mysql://dandi-db.cdocgw0s68cj.ap-northeast-2.rds.amazonaws.com:3306/dandidb?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=dandi
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# AWS S3
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
cloud.aws.region=ap-northeast-2
cloud.aws.s3.bucket=${S3_BUCKET_NAME}

# Multipart upload limits (프론트가 image+file로 동일 파일 2회 첨부 → request 크기 ≈ 파일×2)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=30MB

# Firebase Auth
firebase.admin-sdk-path=${FIREBASE_ADMIN_SDK_PATH:${user.home}/.secrets/firebase/myauth.json}
firebase.allowed-domain=${FIREBASE_ALLOWED_DOMAIN:dankook.ac.kr}
firebase.admin-uids=${FIREBASE_ADMIN_UIDS:}
firebase.admin-emails=${FIREBASE_ADMIN_EMAILS:}

# LLM (Gemini via OpenAI-compatible endpoint)
llm.api-key=${LLM_API_KEY:}
llm.model=${LLM_MODEL:gemini-1.5-flash}
llm.base-url=${LLM_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}

# Chatbot API policy
chatbot.rate-limit.minute=${CHATBOT_RATE_LIMIT_MINUTE:12}
chatbot.rate-limit.hour=${CHATBOT_RATE_LIMIT_HOUR:20}
chatbot.rate-limit.day=${CHATBOT_RATE_LIMIT_DAY:30}
chatbot.sanction.first-block-minutes=${CHATBOT_SANCTION_FIRST_BLOCK_MINUTES:15}
chatbot.sanction.second-block-hours=${CHATBOT_SANCTION_SECOND_BLOCK_HOURS:24}

# Google Cloud Vision
