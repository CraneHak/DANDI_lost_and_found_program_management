spring.application.name=capstonedesign
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/dandidb?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=dandi
spring.datasource.password=dandi1234

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Firebase Auth
firebase.admin-sdk-path=${FIREBASE_ADMIN_SDK_PATH:${user.home}/.secrets/firebase/myauth.json}
firebase.allowed-domain=${FIREBASE_ALLOWED_DOMAIN:dankook.ac.kr}
firebase.admin-uids=${FIREBASE_ADMIN_UIDS:}
firebase.admin-emails=${FIREBASE_ADMIN_EMAILS:}

# Google Cloud Vision
# 권장: GOOGLE_APPLICATION_CREDENTIALS 환경변수에 서비스계정 JSON 경로 지정
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
