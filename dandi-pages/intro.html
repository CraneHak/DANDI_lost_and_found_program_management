<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단디(DANDI) - 로그인</title>
    <!-- Tailwind CSS (디자인 프레임워크) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Noto Sans KR (깔끔한 한글 폰트) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dku: {
                            blue: '#0055A6', // 단국대 시그니처 블루
                            hover: '#004080'
                        }
                    },
                    fontFamily: {
                        sans: ['"Noto Sans KR"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            /* 모바일 앱 화면처럼 보이도록 배경을 흰색으로 설정 */
            background-color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 로그인 폼 컨테이너 (모바일 화면 사이즈에 최적화) -->
    <div class="w-full max-w-md bg-white p-6 sm:p-8">
        
        <!-- 로고 및 타이틀 영역 -->
        <div class="text-center mb-12">
            <!-- 사용자가 업로드한 로고 이미지 적용 -->
            <img src="image_23db80.jpg" alt="단디 로고" class="mx-auto w-32 h-32 rounded-3xl shadow-md object-cover">
            <h1 class="mt-6 text-3xl font-bold text-gray-900 tracking-tight">단디</h1>
            <p class="mt-2 text-sm text-gray-500 font-medium">단국대학교 스마트 분실물 플랫폼</p>
        </div>

        <!-- 로그인 폼 -->
        <form class="space-y-5" action="#" method="POST" onsubmit="event.preventDefault(); alert('로그인 기능은 개발 중입니다.');">
            
            <!-- 이메일 입력 -->
            <div>
                <label for="email" class="block text-sm font-bold text-gray-700 mb-1">이메일</label>
                <div class="relative">
                    <input id="email" name="email" type="email" required 
                        class="appearance-none block w-full px-4 py-3.5 border border-gray-300 rounded-xl placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-dku-blue focus:border-transparent transition-all text-gray-900" 
                        placeholder="단국대학교 웹메일 (@dankook.ac.kr)">
                </div>
            </div>

            <!-- 비밀번호 입력 -->
            <div>
                <label for="password" class="block text-sm font-bold text-gray-700 mb-1">비밀번호</label>
                <div class="relative">
                    <input id="password" name="password" type="password" required 
                        class="appearance-none block w-full px-4 py-3.5 border border-gray-300 rounded-xl placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-dku-blue focus:border-transparent transition-all text-gray-900" 
                        placeholder="비밀번호를 입력하세요">
                </div>
            </div>

            <!-- 자동 로그인 및 비밀번호 찾기 -->
            <div class="flex items-center justify-between pt-2">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" 
                        class="h-4 w-4 text-dku-blue focus:ring-dku-blue border-gray-300 rounded cursor-pointer">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-600 cursor-pointer">
                        자동 로그인
                    </label>
                </div>
                <div class="text-sm">
                    <a href="#" class="font-bold text-dku-blue hover:text-dku-hover transition-colors">
                        비밀번호 찾기
                    </a>
                </div>
            </div>

            <!-- 로그인 버튼 -->
            <div class="pt-4">
                <button type="submit" 
                    class="w-full flex justify-center py-4 px-4 border border-transparent rounded-xl shadow-sm text-base font-bold text-white bg-dku-blue hover:bg-dku-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-dku-blue transition-all active:scale-[0.98]">
                    로그인
                </button>
            </div>
        </form>

        <!-- 회원가입 영역 -->
        <div class="mt-8">
            <div class="relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-white text-gray-500 font-medium">
                        아직 계정이 없으신가요?
                    </span>
                </div>
            </div>

            <div class="mt-6">
                <!-- 회원가입 버튼 (윤곽선 스타일) -->
                <button type="button" onclick="alert('회원가입 페이지로 이동합니다.');"
                    class="w-full flex justify-center py-4 px-4 border-2 border-dku-blue rounded-xl shadow-sm text-base font-bold text-dku-blue bg-white hover:bg-blue-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-dku-blue transition-all active:scale-[0.98]">
                    회원가입
                </button>
            </div>
        </div>
        
    </div>

</body>
</html>
