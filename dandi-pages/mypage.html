<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>단디 - 마이페이지</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { dku: { blue: '#0055A6', light: '#e0f2fe', hover: '#004080' } },
          fontFamily: { sans: ['"Noto Sans KR"', 'sans-serif'] }
        }
      }
    };
  </script>
</head>
<body class="bg-slate-50 pb-20 font-sans">
  <header class="bg-white border-b shadow-sm">
    <div class="max-w-md mx-auto p-4">
      <h1 class="font-bold text-lg text-dku-blue"><i class="fa-solid fa-user mr-1"></i>마이페이지</h1>
    </div>
  </header>

  <main class="max-w-md mx-auto p-4 space-y-4">
    <section class="bg-white border border-slate-100 rounded-2xl p-4 shadow-sm">
      <p class="font-semibold">단국인 님</p>
      <p class="text-sm text-slate-500">user@dankook.ac.kr</p>
    </section>

    <section class="bg-white border border-slate-100 rounded-2xl p-4 space-y-3 shadow-sm">
      <h2 class="font-semibold">매칭 알림 설정</h2>
      <label class="flex justify-between text-sm"><span>키워드 알림</span><input type="checkbox" checked></label>
      <label class="flex justify-between text-sm"><span>건물 알림</span><input type="checkbox" checked></label>
    </section>

    <section class="bg-white border border-slate-100 rounded-2xl p-4 space-y-2 shadow-sm">
      <h2 class="font-semibold">내 기록</h2>
      <p class="text-sm text-slate-600">- 내가 쓴 글: 4건</p>
      <p class="text-sm text-slate-600">- 매칭 알림 내역: 2건</p>
      <p class="text-sm text-slate-600">- 수령 완료 기록: 3건</p>
    </section>

    <a href="./login.html" class="block text-center bg-white border border-slate-200 py-3 rounded-xl text-slate-600">로그아웃</a>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-[0_-2px_10px_rgba(0,0,0,0.06)] z-50">
    <div class="max-w-md mx-auto grid grid-cols-4 text-center text-xs">
      <a href="./main.html" class="py-2 text-slate-500"><i class="fa-solid fa-house block text-lg mb-1"></i>홈</a>
      <a href="./map.html" class="py-2 text-slate-500"><i class="fa-solid fa-map-location-dot block text-lg mb-1"></i>지도</a>
      <a href="./admin-register.html" class="py-2 text-slate-500"><i class="fa-solid fa-camera block text-lg mb-1"></i>관리자</a>
      <a href="./mypage.html" class="py-2 font-semibold text-dku-blue"><i class="fa-solid fa-user block text-lg mb-1"></i>마이</a>
    </div>
  </nav>
</body>
</html>
