<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>단디 - 등록 권한 안내</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { dku: { blue: '#0055A6', light: '#e0f2fe', hover: '#004080' } },
          fontFamily: { sans: ['"Noto Sans KR"', 'sans-serif'] }
        }
      }
    };
  </script>
</head>
<body class="bg-slate-50 pb-20 font-sans">
  <header class="bg-white border-b shadow-sm">
    <div class="max-w-md mx-auto p-4 flex items-center justify-between">
      <h1 class="font-bold text-lg text-dku-blue"><i class="fa-solid fa-user-shield mr-1"></i>등록 권한 안내</h1>
      <a href="./main.html" class="text-sm text-slate-500">취소</a>
    </div>
  </header>

  <main class="max-w-md mx-auto p-4 space-y-4">
    <section class="bg-white border border-slate-100 rounded-2xl p-4 space-y-3 shadow-sm">
      <p class="text-sm text-slate-700">보안 정책상 <strong>물품 등록은 관리자만</strong> 수행할 수 있습니다.</p>
      <p class="text-sm text-slate-600">사진 업로드 및 Google Vision 자동 태깅은 관리자 등록 화면에서 진행됩니다.</p>
      <a href="./admin-register.html" class="block text-center w-full bg-dku-blue text-white py-3 rounded-xl font-semibold">관리자 등록 페이지로 이동</a>
    </section>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-[0_-2px_10px_rgba(0,0,0,0.06)] z-50">
    <div class="max-w-md mx-auto grid grid-cols-4 text-center text-xs">
      <a href="./main.html" class="py-2 text-slate-500"><i class="fa-solid fa-house block text-lg mb-1"></i>홈</a>
      <a href="./map.html" class="py-2 text-slate-500"><i class="fa-solid fa-map-location-dot block text-lg mb-1"></i>지도</a>
      <a href="./admin-register.html" class="py-2 font-semibold text-dku-blue"><i class="fa-solid fa-camera block text-lg mb-1"></i>관리자</a>
      <a href="./mypage.html" class="py-2 text-slate-500"><i class="fa-solid fa-user block text-lg mb-1"></i>마이</a>
    </div>
  </nav>
</body>
</html>
