<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>단디 - 수령 인증</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { dku: { blue: '#0055A6', light: '#e0f2fe' } },
          fontFamily: { sans: ['"Noto Sans KR"', 'sans-serif'] }
        }
      }
    };
  </script>
</head>
<body class="bg-slate-50 min-h-screen font-sans pb-20">
  <main class="max-w-xl mx-auto px-4 py-10">
    <section class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
      <h1 class="text-2xl font-bold text-dku-blue mb-2"><i class="fa-solid fa-shield-halved mr-2"></i>수령 인증</h1>
      <p class="text-sm text-slate-600 mb-5">OTP 또는 QR을 통해 분실물 수령 인증을 진행합니다.</p>

      <label class="block text-sm font-semibold text-slate-700 mb-2">일회용 인증번호</label>
      <div class="flex gap-2 mb-3">
        <input maxlength="6" placeholder="6자리 입력" class="flex-1 border border-slate-300 rounded-xl px-3 py-2">
        <button class="bg-dku-blue text-white px-4 rounded-xl">인증</button>
      </div>

      <div class="text-xs text-slate-500 bg-slate-50 border rounded-lg p-3">
        관리자 확인 후 장부 기록이 완료됩니다.
      </div>

      <a href="./main.html" class="inline-block mt-5 text-sm text-dku-blue">메인으로 돌아가기</a>
    </section>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-[0_-2px_10px_rgba(0,0,0,0.06)] z-50">
    <div class="max-w-md mx-auto grid grid-cols-4 text-center text-xs">
      <a href="./main.html" class="py-2 text-slate-500"><i class="fa-solid fa-house block text-lg mb-1"></i>홈</a>
      <a href="./map.html" class="py-2 text-slate-500"><i class="fa-solid fa-map-location-dot block text-lg mb-1"></i>지도</a>
      <a href="./admin-register.html" class="py-2 font-semibold text-dku-blue"><i class="fa-solid fa-camera block text-lg mb-1"></i>관리자</a>
      <a href="./mypage.html" class="py-2 text-slate-500"><i class="fa-solid fa-user block text-lg mb-1"></i>마이</a>
    </div>
  </nav>
</body>
</html>
