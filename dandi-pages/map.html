<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>단디 - 지도 페이지</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { dku: { blue: '#0055A6', light: '#e0f2fe', hover: '#004080' } },
          fontFamily: { sans: ['"Noto Sans KR"', 'sans-serif'] }
        }
      }
    };
  </script>
</head>
<body class="bg-slate-50 pb-20 font-sans">
  <header class="bg-white border-b shadow-sm">
    <div class="max-w-md mx-auto p-4 flex items-center justify-between">
      <h1 class="font-bold text-lg">주변 관리실 지도</h1>
      <a href="./main.html" class="text-sm text-slate-500">홈으로</a>
    </div>
  </header>

  <main class="max-w-md mx-auto p-4 space-y-4">
    <section class="relative h-80 bg-dku-light border border-blue-200 rounded-2xl overflow-hidden shadow-sm">
      <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#64748b 1px, transparent 1px); background-size: 18px 18px;"></div>
      <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-xs bg-dku-blue text-white px-2 py-1 rounded-full">현재 위치</div>

      <button onclick="showPin('소융대 교학팀', '소프트웨어ICT관 2층', '031-8005-1234')" class="absolute left-20 top-16 text-2xl">📍</button>
      <button onclick="showPin('상경관 관리실', '상경관 1층 로비', '031-8005-5678')" class="absolute right-20 top-24 text-2xl">📍</button>
      <button onclick="showPin('분실물 현황판', '도서관 앞 현황판', '전화 없음')" class="absolute right-24 bottom-16 text-2xl">🗂️</button>
    </section>

    <section id="panel" class="bg-white border border-slate-100 rounded-2xl p-4 shadow-sm">
      <h2 id="title" class="font-bold">핀을 눌러 상세 확인</h2>
      <div class="h-24 my-2 bg-slate-200 rounded-lg flex items-center justify-center text-slate-600 text-sm">[관리실/현황판 사진]</div>
      <p id="desc" class="text-sm text-slate-600">위치 정보가 표시됩니다.</p>
      <p id="phone" class="text-sm text-dku-blue mt-1">전화번호가 표시됩니다.</p>
    </section>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-[0_-2px_10px_rgba(0,0,0,0.06)] z-50">
    <div class="max-w-md mx-auto grid grid-cols-4 text-center text-xs">
      <a href="./main.html" class="py-2 text-slate-500"><i class="fa-solid fa-house block text-lg mb-1"></i>홈</a>
      <a href="./map.html" class="py-2 font-semibold text-dku-blue"><i class="fa-solid fa-map-location-dot block text-lg mb-1"></i>지도</a>
      <a href="./admin-register.html" class="py-2 text-slate-500"><i class="fa-solid fa-camera block text-lg mb-1"></i>관리자</a>
      <a href="./mypage.html" class="py-2 text-slate-500"><i class="fa-solid fa-user block text-lg mb-1"></i>마이</a>
    </div>
  </nav>

  <script>
    function showPin(title, desc, phone) {
      document.getElementById('title').textContent = title;
      document.getElementById('desc').textContent = desc;
      document.getElementById('phone').textContent = '전화: ' + phone;
    }
  </script>
</body>
</html>
