<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>단디 - 관리자 물품 등록</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { dku: { blue: '#0055A6', light: '#e0f2fe', hover: '#004080' } },
          fontFamily: { sans: ['"Noto Sans KR"', 'sans-serif'] }
        }
      }
    };
  </script>
</head>
<body class="bg-slate-50 pb-20 font-sans">
  <header class="bg-white border-b shadow-sm">
    <div class="max-w-md mx-auto p-4 flex items-center justify-between">
      <h1 class="font-bold text-lg">관리자 물품 등록</h1>
      <a href="./main.html" class="text-sm text-slate-500">홈</a>
    </div>
  </header>

  <main class="max-w-md mx-auto p-4 space-y-4">
    <section class="bg-amber-50 border border-amber-200 rounded-2xl p-3 text-sm text-amber-800">
      <i class="fa-solid fa-user-shield mr-1"></i> 등록은 관리자 계정만 가능합니다.
    </section>

    <section class="bg-white border border-slate-100 rounded-2xl p-4 shadow-sm">
      <h2 class="font-semibold"><i class="fa-solid fa-image mr-1 text-dku-blue"></i>사진 업로드</h2>
      <input id="photoInput" type="file" accept="image/*" class="hidden" onchange="handlePhotoUpload(event)">
      <button onclick="document.getElementById('photoInput').click()" class="mt-3 w-full border-2 border-dashed border-slate-300 rounded-xl py-8 text-slate-500 hover:bg-slate-50">클릭하여 사진 업로드</button>
      <div id="photoPreview" class="hidden mt-3 rounded-xl border border-slate-200 p-2 bg-slate-50">
        <img id="previewImage" src="" alt="업로드 미리보기" class="w-full h-36 object-cover rounded-lg">
      </div>
      <p class="text-xs text-slate-500 mt-2">신분증은 사진 없이 텍스트 정보만 기록합니다.</p>
    </section>

    <section class="bg-white border border-slate-100 rounded-2xl p-4 space-y-2 shadow-sm">
      <label class="text-sm font-semibold"><i class="fa-solid fa-shield-halved mr-1 text-dku-blue"></i>OTP 인증 (장부 기록)</label>
      <div class="flex gap-2">
        <input id="otp" maxlength="6" class="flex-1 border rounded-xl px-3 py-2" placeholder="6자리 OTP">
        <button onclick="requestOtp()" class="bg-slate-800 text-white px-3 rounded-xl">인증요청</button>
      </div>
      <p id="otpStatus" class="text-xs text-slate-500">인증 대기</p>
    </section>

    <div class="grid grid-cols-2 gap-3">
      <button onclick="alert('DB에 장부 기록 완료')" class="bg-dku-blue text-white py-3 rounded-xl font-semibold">등록 완료</button>
      <button onclick="alert('잘못 등록된 물품 삭제 + DB 업데이트 완료')" class="bg-red-600 text-white py-3 rounded-xl font-semibold">등록 삭제</button>
    </div>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-[0_-2px_10px_rgba(0,0,0,0.06)] z-50">
    <div class="max-w-md mx-auto grid grid-cols-4 text-center text-xs">
      <a href="./main.html" class="py-2 text-slate-500"><i class="fa-solid fa-house block text-lg mb-1"></i>홈</a>
      <a href="./map.html" class="py-2 text-slate-500"><i class="fa-solid fa-map-location-dot block text-lg mb-1"></i>지도</a>
      <a href="./admin-register.html" class="py-2 font-semibold text-dku-blue"><i class="fa-solid fa-camera block text-lg mb-1"></i>관리자</a>
      <a href="./mypage.html" class="py-2 text-slate-500"><i class="fa-solid fa-user block text-lg mb-1"></i>마이</a>
    </div>
  </nav>

  <script>
    function handlePhotoUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('previewImage').src = e.target.result;
        document.getElementById('photoPreview').classList.remove('hidden');
        document.getElementById('vision').textContent = '사진 업로드 완료. Vision 분석을 실행하세요.';
      };
      reader.readAsDataURL(file);
    }

    function requestOtp() {
      const otp = document.getElementById('otp').value.trim();
      const status = document.getElementById('otpStatus');
      if (otp.length !== 6) {
        status.textContent = 'OTP 6자리를 입력해 주세요.';
        status.className = 'text-xs text-red-600';
        return;
      }
      status.textContent = 'OTP 인증 성공, 장부 기록 가능 상태';
      status.className = 'text-xs text-green-700';
    }
  </script>
</body>
</html>
